<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Round Analysis</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <div class="global-controls">
        <label>
          Outcome
          <select id="outcomeFilter">
            <option value="all">All</option>
            <option value="win">Wins</option>
            <option value="loss">Losses</option>
          </select>
        </label>

        <label>
          Metric
          <select id="metricSelect">
            <option value="first_contact">First Contact</option>
            <option value="first_kill">First Kill</option>
            <option value="trade">Trade</option>
            <option value="kill">Kill</option>
            <option value="plant">Plant</option>
            <option value="round_end">Round End</option>
          </select>
        </label>
      </div>
    </div>

    <main class="dashboard-grid">
      <section class="left-column">
        <section class="map-only-panel">
          <div class="map-stage map-stage-clean">
            <div class="map-zoom-controls">
              <button id="zoomOutBtn" type="button">−</button>
              <button id="zoomInBtn" type="button">+</button>
              <button id="zoomResetBtn" type="button">Reset</button>
            </div>

            <svg
              id="mapSvg"
              viewBox="0 0 848 880"
              preserveAspectRatio="xMidYMid meet"
              xmlns="http://www.w3.org/2000/svg"
            >
              <image href="assets/ASCENT.svg" x="0" y="0" width="848" height="880"></image>
            </svg>
          </div>
        </section>
      </section>

      <section class="right-column">
        <section class="panel summary-panel">
          <details id="summaryAccordion">
            <summary>Summary + Histogram</summary>
            <div class="summary-content">
              <div class="stat-cards">
                <div class="stat-card">
                  <span class="stat-label">Rounds</span>
                  <span class="stat-value" id="roundCount">0</span>
                </div>

                <div class="stat-card">
                  <span class="stat-label">Avg First Contact</span>
                  <span class="stat-value" id="avgFirstContact">0s</span>
                </div>

                <div class="stat-card">
                  <span class="stat-label">Avg First Kill</span>
                  <span class="stat-value" id="avgFirstKill">0s</span>
                </div>
              </div>

              <div class="chart-wrap compact-chart">
                <svg id="histogramSvg"></svg>
              </div>
            </div>
          </details>
        </section>

        <section class="panel timeline-panel">
          <div class="panel-header compact-header">
            <h2>Stacked Timeline</h2>
          </div>

          <div class="timeline-wrap">
            <svg id="timelineSvg"></svg>
          </div>
        </section>

        <section class="panel control-panel">
          <div class="panel-header compact-header">
            <h2>Scrub + Controls</h2>
          </div>

          <div class="control-content">
            <div class="current-round-box">
              <h3 id="selectedRoundTitle">Round 1</h3>
              <p id="selectedRoundMeta">NRG Win</p>
            </div>

            <div class="round-select-row">
              <button id="prevRoundBtn" type="button">Prev</button>
              <button id="nextRoundBtn" type="button">Next</button>

              <label class="round-select-label">
                Select Round
                <select id="roundSelect"></select>
              </label>
            </div>

            <div class="scrubber-wrap">
              <label for="timeScrubber">Time Scrubber</label>
              <input id="timeScrubber" type="range" min="0" max="100" step="0.25" value="0" />
              <div class="scrubber-icon-wrap">
                <svg id="scrubberEventsSvg"></svg>
              </div>
              <div class="scrubber-labels">
                <span>0s</span>
                <span id="currentTimeLabel">0s</span>
                <span>100s</span>
              </div>
            </div>

            <div class="playback-row">
              <button id="playBtn" type="button">Play</button>
              <button id="pauseBtn" type="button">Pause</button>
            </div>

            <div class="legend-inline">
              <div class="legend">
                <div class="legend-section">
                  <span class="legend-heading">Round Color</span>
                  <div class="legend-item"><span class="legend-dot win"></span><span>NRG Win</span></div>
                  <div class="legend-item"><span class="legend-dot loss"></span><span>NRG Loss</span></div>
                </div>

                <div class="legend-section">
                  <span class="legend-heading">Map Marks</span>
                  <div class="legend-item"><span class="legend-source-demo"></span><span>Source</span></div>
                  <div class="legend-item"><span class="legend-target-demo">✕</span><span>Target</span></div>
                  <div class="legend-item"><span class="legend-player-demo"></span><span>Player Position</span></div>
                </div>

                <div class="legend-section">
                  <span class="legend-heading">Timeline Shapes</span>
                  <div class="legend-item"><span class="shape-demo circle"></span><span>First Contact</span></div>
                  <div class="legend-item"><span class="shape-demo triangle"></span><span>First Kill</span></div>
                  <div class="legend-item"><span class="shape-demo square"></span><span>Trade</span></div>
                  <div class="legend-item"><span class="shape-demo diamond"></span><span>Kill</span></div>
                  <div class="legend-item"><span class="shape-demo star">★</span><span>Plant</span></div>
                  <div class="legend-item"><span class="shape-demo cross">✕</span><span>Round End</span></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script src="app.js"></script>
</body>
</html>
